<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyside Brief — Launch Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #faf8f4;
      --cream-dark: #f2efe8;
      --white: #ffffff;
      --ink: #1a1a1a;
      --ink-light: #3d3d3d;
      --ink-muted: #7a7a7a;
      --ink-faint: #b0a99f;
      --green: #1a7a4c;
      --green-bg: #e8f5ee;
      --green-bright: #22a45d;
      --red: #c0392b;
      --red-bg: #fce8e6;
      --amber: #d4a853;
      --amber-bg: #fdf6e8;
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --rule: #e0dbd3;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .header {
      border-bottom: 2px solid var(--ink);
      padding: 32px 0 20px;
      margin-bottom: 32px;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .header h1 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.1;
    }

    .header h1 em { color: var(--green); font-style: italic; }

    .header .subtitle {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      text-align: right;
    }

    .progress-label {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }

    .progress-label strong {
      color: var(--green);
      font-size: 22px;
      font-family: var(--serif);
    }

    .progress-bar {
      width: 200px;
      height: 8px;
      background: var(--cream-dark);
      border-radius: 4px;
      overflow: hidden;
      margin-left: auto;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green-bright));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── Container ── */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Phase ── */
    .phase {
      margin-bottom: 36px;
    }

    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 4px;
      cursor: pointer;
      user-select: none;
    }

    .phase-header:hover .phase-title { color: var(--green); }

    .phase-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      transition: color 0.15s;
    }

    .phase-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .phase-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-muted);
    }

    .phase-toggle {
      font-size: 14px;
      color: var(--ink-faint);
      transition: transform 0.2s;
    }

    .phase.collapsed .phase-toggle { transform: rotate(-90deg); }
    .phase.collapsed .phase-items { display: none; }

    .phase-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    .badge-done { background: var(--green-bg); color: var(--green); }
    .badge-active { background: var(--amber-bg); color: var(--amber); }
    .badge-upcoming { background: var(--blue-bg); color: var(--blue); }
    .badge-blocked { background: var(--red-bg); color: var(--red); }

    /* ── Todo items ── */
    .phase-items { padding: 4px 0; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .todo-item:hover { background: var(--white); }

    .todo-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border: 2px solid var(--rule);
      border-radius: 5px;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      cursor: pointer;
    }

    .todo-check:hover { border-color: var(--green); }

    .todo-item.done .todo-check {
      background: var(--green);
      border-color: var(--green);
    }

    .todo-check svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item.done .todo-check svg { opacity: 1; }

    .todo-content { flex: 1; min-width: 0; }

    .todo-text {
      font-size: 14px;
      color: var(--ink);
      transition: color 0.15s;
    }

    .todo-item.done .todo-text {
      color: var(--ink-faint);
      text-decoration: line-through;
      text-decoration-color: var(--rule);
    }

    .todo-note {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .todo-item.done .todo-note { color: var(--ink-faint); }

    .todo-tags {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .todo-tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 3px;
      background: var(--cream-dark);
      color: var(--ink-muted);
    }

    .todo-tag.critical { background: var(--red-bg); color: var(--red); }
    .todo-tag.money { background: var(--amber-bg); color: var(--amber); }

    /* ── Footer ── */
    .footer {
      max-width: 800px;
      margin: 48px auto 0;
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--rule);
    }

    .footer p {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .reset-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      background: none;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    .reset-btn:hover { color: var(--red); border-color: var(--red); }

    /* ── Animations ── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .phase { animation: fade-in 0.3s ease both; }
    .phase:nth-child(2) { animation-delay: 0.05s; }
    .phase:nth-child(3) { animation-delay: 0.1s; }
    .phase:nth-child(4) { animation-delay: 0.15s; }
    .phase:nth-child(5) { animation-delay: 0.2s; }
    .phase:nth-child(6) { animation-delay: 0.25s; }
    .phase:nth-child(7) { animation-delay: 0.3s; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>Buyside <em>Brief</em></h1>
      <p class="subtitle">Launch Tracker</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><strong id="pctDone">0%</strong> complete</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" style="margin-top:4px;"><span id="doneCount">0</span> / <span id="totalCount">0</span> tasks</div>
    </div>
  </div>
</div>

<div class="container" id="app"></div>

<div class="footer">
  <p>Buyside Brief — Launch Tracker</p>
  <button class="reset-btn" onclick="resetAll()">Reset all</button>
</div>

<script>
const DATA = [
  {
    phase: "Domain & Accounts",
    badge: "active",
    items: [
      { id: "dom1", text: "Register buysidebrief.com on GoDaddy", note: "~$12", tags: ["money"] },
      { id: "dom2", text: "Create GitHub repo (private)", note: "github.com/new → buysidebrief" },
      { id: "dom3", text: "Push code to GitHub", note: "git init, add, commit, push" },
      { id: "dom4", text: "Create Vercel project from repo", note: "Use name 'buysidebrief-app' if 'buysidebrief' is taken" },
      { id: "dom5", text: "Point DNS to Vercel", note: "A record → 76.76.21.21, CNAME www → cname.vercel-dns.com" },
      { id: "dom6", text: "Add domain in Vercel dashboard", note: "Settings → Domains → buysidebrief.com" },
      { id: "dom7", text: "Verify SSL certificate is active", note: "Vercel handles this automatically after DNS propagates" },
    ]
  },
  {
    phase: "Email & Sending",
    badge: "active",
    items: [
      { id: "email1", text: "Verify buysidebrief.com domain in Resend", note: "Resend → Domains → Add DNS records in GoDaddy", tags: ["critical"] },
      { id: "email2", text: "Create Resend audience: 'Buyside Brief Subscribers'", note: "Resend → Audiences → copy audience ID" },
      { id: "email3", text: "Add RESEND_API_KEY to Vercel env vars" },
      { id: "email4", text: "Add RESEND_AUDIENCE_ID to Vercel env vars" },
      { id: "email5", text: "Add SEC_USER_AGENT to Vercel env vars", note: "BuysideBrief hello@buysidebrief.com" },
      { id: "email6", text: "Add TEST_EMAIL to Vercel env vars", note: "Your personal email for test sends" },
      { id: "email7", text: "Send a test email from Resend dashboard", note: "Confirm domain verification works" },
    ]
  },
  {
    phase: "Price Data APIs",
    badge: "upcoming",
    items: [
      { id: "price1", text: "Sign up for Finnhub free tier", note: "finnhub.io/register — 60 req/min" },
      { id: "price2", text: "Add FINNHUB_API_KEY to Vercel env vars" },
      { id: "price3", text: "Sign up for Alpha Vantage (optional fallback)", note: "alphavantage.co — 25 req/day" },
      { id: "price4", text: "Add ALPHA_VANTAGE_KEY to Vercel env vars", note: "Optional — Finnhub is primary" },
    ]
  },
  {
    phase: "Test & Validate",
    badge: "upcoming",
    items: [
      { id: "test1", text: "Run dry run: /api/fetch-and-send?dry=true", note: "Check JSON response for scored filings", tags: ["critical"] },
      { id: "test2", text: "Review signal scores — do thresholds feel right?", note: "Adjust in lib/signal-scorer.js if too many or too few signals" },
      { id: "test3", text: "Check 'Why it matters' blurbs on top picks", note: "Should read like a smart friend, not a data dump" },
      { id: "test4", text: "Send live test email to yourself", note: "Hit /api/fetch-and-send (no ?dry) with TEST_EMAIL set" },
      { id: "test5", text: "Check email rendering in Gmail", note: "Verify fonts, colors, spacing, links" },
      { id: "test6", text: "Check email rendering on mobile", note: "Open on your phone — is it readable?" },
      { id: "test7", text: "Test subscribe form on landing page", note: "Enter email → check Resend audience for new contact" },
      { id: "test8", text: "Test weekly digest: /api/send-weekly?dry=true" },
    ]
  },
  {
    phase: "Launch",
    badge: "upcoming",
    items: [
      { id: "launch1", text: "Upgrade Vercel to Pro plan", note: "$20/mo — needed for crons > 1/day and longer timeouts", tags: ["money"] },
      { id: "launch2", text: "Verify cron jobs are active in Vercel dashboard", note: "Settings → Crons — should show daily + weekly schedules" },
      { id: "launch3", text: "Send Issue #1 manually to yourself", note: "This is your last check before real subscribers" },
      { id: "launch4", text: "Subscribe yourself to the list via the landing page" },
      { id: "launch5", text: "Wait for first automated cron run (11pm ET)", note: "Check Vercel function logs the next morning" },
      { id: "launch6", text: "Confirm email arrived in your inbox" },
    ]
  },
  {
    phase: "Get First Subscribers",
    badge: "upcoming",
    items: [
      { id: "grow1", text: "Post on r/investing with a sample issue", note: "Show real value — include a screenshot of an actual digest" },
      { id: "grow2", text: "Post on r/stocks", note: "Different angle — focus on the scoring model" },
      { id: "grow3", text: "Post on Hacker News (Show HN)", note: "Lead with the tech: free SEC API → scoring → daily email" },
      { id: "grow4", text: "Share on Twitter/X with a sample signal", note: "Tag #fintwit — the finance Twitter community" },
      { id: "grow5", text: "Tell 5 friends who invest", note: "Personal referrals convert highest" },
      { id: "grow6", text: "Cross-promote from ShopsTally audience", note: "Different audience but same trust" },
    ]
  },
  {
    phase: "Post-Launch Improvements",
    badge: "upcoming",
    items: [
      { id: "post1", text: "Monitor scorecard data after 7 days", note: "Do the 7-day returns look meaningful?" },
      { id: "post2", text: "Calibrate scoring thresholds based on real data", note: "Are you getting 0 signals or 50? Adjust accordingly" },
      { id: "post3", text: "Add CEO track record to Top Pick blurbs", note: "Uses getInsiderTrackRecord() — needs 30+ days of data" },
      { id: "post4", text: "Build /scorecard page on the website", note: "Public performance tracker — your credibility builder" },
      { id: "post5", text: "Set up Beehiiv as backup subscriber management", note: "Optional — Resend handles it for now" },
      { id: "post6", text: "Add archive pages for past issues", note: "SEO value — deferred from MVP" },
      { id: "post7", text: "Explore 52-week-low proximity signal", note: "Requires price data — now feasible with Finnhub" },
      { id: "post8", text: "Plan Insider Signal Pro ($9/mo tier)", note: "Real-time alerts, sector filters, watchlists" },
    ]
  },
];

// ── State ──
const STORAGE_KEY = 'buysidebrief_tracker';

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && Object.keys(saved).length > 0) return saved;
  } catch {}
  // Default state — pre-checked items
  return {
    "dom1": true,
    "dom2": true,
    "dom3": true,
    "dom4": true,
  };
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toggleItem(id) {
  const state = loadState();
  state[id] = !state[id];
  saveState(state);
  render();
}

function togglePhase(idx) {
  const state = loadState();
  const key = `_phase_collapsed_${idx}`;
  state[key] = !state[key];
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

// ── Render ──
function render() {
  const state = loadState();
  const app = document.getElementById('app');

  let totalItems = 0;
  let doneItems = 0;

  let html = '';

  DATA.forEach((phase, phaseIdx) => {
    const phaseDone = phase.items.filter(i => state[i.id]).length;
    const phaseTotal = phase.items.length;
    totalItems += phaseTotal;
    doneItems += phaseDone;

    const collapsed = state[`_phase_collapsed_${phaseIdx}`];
    const allDone = phaseDone === phaseTotal;

    // Determine badge
    let badge = phase.badge;
    if (allDone) badge = 'done';
    else if (phaseDone > 0) badge = 'active';

    const badgeLabel = { done: 'Complete', active: 'In Progress', upcoming: 'Upcoming', blocked: 'Blocked' }[badge] || badge;
    const badgeClass = { done: 'badge-done', active: 'badge-active', upcoming: 'badge-upcoming', blocked: 'badge-blocked' }[badge] || '';

    html += `
      <div class="phase ${collapsed ? 'collapsed' : ''}">
        <div class="phase-header" onclick="togglePhase(${phaseIdx})">
          <span class="phase-title">${phase.phase}</span>
          <div class="phase-meta">
            <span class="phase-badge ${badgeClass}">${badgeLabel}</span>
            <span class="phase-count">${phaseDone}/${phaseTotal}</span>
            <span class="phase-toggle">▼</span>
          </div>
        </div>
        <div class="phase-items">
          ${phase.items.map(item => {
            const done = state[item.id];
            return `
              <div class="todo-item ${done ? 'done' : ''}" onclick="toggleItem('${item.id}')">
                <div class="todo-check">
                  <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="2,6 5,9 10,3"/>
                  </svg>
                </div>
                <div class="todo-content">
                  <div class="todo-text">${item.text}</div>
                  ${item.note ? `<div class="todo-note">${item.note}</div>` : ''}
                  ${item.tags ? `<div class="todo-tags">${item.tags.map(t => `<span class="todo-tag ${t}">${t}</span>`).join('')}</div>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  });

  app.innerHTML = html;

  // Update progress
  const pct = totalItems > 0 ? Math.round((doneItems / totalItems) * 100) : 0;
  document.getElementById('pctDone').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('doneCount').textContent = doneItems;
  document.getElementById('totalCount').textContent = totalItems;
}

render();
</script>
</body>
</html>
